<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 三个相互连接的S形，形成六边形图案 -->
  
  <!-- 第一个S形 (右下) -->
  <path d="M 30 20 
           C 25 20, 25 28, 30 32
           C 35 36, 35 44, 30 48
           C 25 52, 25 60, 30 64
           C 35 68, 40 68, 45 64" 
        stroke="#1E88E5" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round" />
  
  <!-- 第二个S形 (左) 旋转120度 -->
  <g transform="rotate(120 60 60)">
    <path d="M 30 20 
             C 25 20, 25 28, 30 32
             C 35 36, 35 44, 30 48
             C 25 52, 25 60, 30 64
             C 35 68, 40 68, 45 64" 
          stroke="#1E88E5" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          stroke-linejoin="round" />
  </g>
  
  <!-- 第三个S形 (右上) 旋转240度 -->
  <g transform="rotate(240 60 60)">
    <path d="M 30 20 
             C 25 20, 25 28, 30 32
             C 35 36, 35 44, 30 48
             C 25 52, 25 60, 30 64
             C 35 68, 40 68, 45 64" 
          stroke="#1E88E5" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          stroke-linejoin="round" />
  </g>
</svg>

